name: MEAN Stack CI/CD

on:
 push:
  branches:
   - main

jobs:

 build-and-push:

  runs-on: ubuntu-latest

  steps:

   - name: Checkout Code
     uses: actions/checkout@v3

   - name: Docker Login
     uses: docker/login-action@v2
     with:
       username: ${{ secrets.DOCKER_USERNAME }}
       password: ${{ secrets.DOCKER_PASSWORD }}

   - name: Build Backend Image
     run: |
       docker build -t cloudguy03/backend:latest ./backend
       docker push cloudguy03/backend:latest

   - name: Build Frontend Image
     run: |
       docker build -t cloudguy03/frontend:latest ./frontend
       docker push cloudguy03/frontend:latest
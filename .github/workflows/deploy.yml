name: CI-CD

on:
 push:
   branches:
     - main

jobs:

 build:

   runs-on: ubuntu-latest

   steps:

   - name: Checkout
     uses: actions/checkout@v3

   - name: Docker Login
     uses: docker/login-action@v2
     with:
       username: ${{ secrets.DOCKER_USERNAME }}
       password: ${{ secrets.DOCKER_PASSWORD }}

   - name: Build Backend
     run: |
       docker build -t cloudguy03/backend:v1 ./backend

   - name: Push Backend
     run: |
       docker push cloudguy03/backend:v1

   - name: Build Frontend
     run: |
       docker build -t cloudguy03/frontend:v1 ./frontend

   - name: Push Frontend
     run: |
       docker push cloudguy03/frontend:v1
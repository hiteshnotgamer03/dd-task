services:

  mongodb:
    image: mongo:latest
    container_name: mongodb
    restart: always
    volumes:
      - mongo-data:/data/db
    networks:
      - mean-network


  backend:
    image: cloudguy03/backend:v1
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
    networks:
      - mean-network


  frontend:
    image: cloudguy03/frontend:v1
    container_name: frontend
    restart: always
    depends_on:
      - backend
    networks:
      - mean-network


  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - mean-network


volumes:
  mongo-data:


networks:
  mean-network:
    driver: bridge